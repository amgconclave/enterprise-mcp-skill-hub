services:
  api:
    build: .
    env_file: .env.example
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    env_file: .env.example
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: python -m streamlit run dashboard/streamlit_app.py --server.address 0.0.0.0
