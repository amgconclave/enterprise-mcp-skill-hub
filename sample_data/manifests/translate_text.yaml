id: translate_text
name: Translation Stub
version: 1.0.0
description: Return a deterministic placeholder translation with language metadata.
provider: mock
enabled: true
tags: [translation, local-mode]
input_schema:
  type: object
  properties:
    text:
      type: string
    target_language:
      type: string
    source_language:
      type: string
  required: [text, target_language]
output_schema:
  type: object
  properties:
    translated_text:
      type: string
    source_language:
      type: string
    target_language:
      type: string
    quality:
      type: string
  required: [translated_text, target_language]
